name: Build and Publish Docker Image

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  GITOPS_REPO: git@github.com:jiangxiamiao/my-app-deploy.git   # 替换为你的 GitOps 仓库 SSH 地址

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log into ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=branch
            type=sha,format=short   # 生成短 commit SHA 作为标签，例如 2f18d4d
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-gitops:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'   # 只在 push 时更新
    steps:
      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: jiangxiamiao/my-app-deploy   # 你的 GitOps 仓库名
          ssh-key: ${{ secrets.GITOPS_SSH_PRIVATE_KEY }}
          path: gitops-repo

      - name: Update image tag in nginx-deployment.yaml
        run: |
          cd gitops-repo
          # 假设 deployment.yaml 中镜像字段为：image: ghcr.io/jiangxiamiao/my-app:xxx
          # 使用短 commit SHA 作为新标签（与构建时的 sha 标签保持一致）
          NEW_TAG="${{ github.sha }}"
          # 如果只想用 latest，可以改为 NEW_TAG="latest"
          sed -i "s|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${NEW_TAG}|g" nginx-deployment.yaml
          # 可选：验证修改
          cat nginx-deployment.yaml

      - name: Commit and push changes
        run: |
          cd gitops-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nginx-deployment.yaml
          git diff --staged --quiet || git commit -m "Update image tag to ${{ github.sha }} [skip ci]"
          git push
