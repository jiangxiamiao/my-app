name: Build and Publish Docker Image

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]

env:
  # GitHub Container Registry й…ҚзҪ®  
  REGISTRY_GHCR: ghcr.io  
  IMAGE_NAME_GHCR: ${{ github.repository }}  
  # Docker Hub й…ҚзҪ® (ж јејҸпјҡз”ЁжҲ·еҗҚ/йЎ№зӣ®еҗҚ)  
  IMAGE_NAME_DOCKERHUB: ${{ secrets.DOCKERHUB_USERNAME }}/my-app
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # н ҪнұҮ еңЁиҝҷйҮҢж·»еҠ  Docker Hub зҷ»еҪ•жӯҘйӘӨ
      - name: Log into Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-gitops:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'
    steps:
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GITOPS_SSH_PRIVATE_KEY }}

      - name: Clone GitOps repository
        run: git clone ${{ env.GITOPS_REPO }} gitops-repo

      - name: Update image tag in nginx-deployment.yaml
        run: |
          cd gitops-repo
          NEW_TAG="${{ github.sha }}"
          # жӣҝжҚўй•ңеғҸиЎҢпјҢж”ҜжҢҒ ghcr.io/xiamiao/my-app жҲ– docker.io/xiamiao/my-app
          sed -i "s|image: .*|image: docker.io/xiamiao/my-app:${NEW_TAG}|g" nginx-deployment.yaml
          cat nginx-deployment.yaml

      - name: Commit and push changes
        run: |
          cd gitops-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nginx-deployment.yaml
          git diff --staged --quiet || git commit -m "Update image to ${{ github.sha }} [skip ci]"
          git push
